<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanningPro — RDV Techniciens</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0f;--s1:#0f1218;--s2:#161b25;--s3:#1d2333;
  --border:#1f2637;--border2:#2a3347;
  --accent:#3d8bff;--adim:rgba(61,139,255,0.1);
  --green:#00d68f;--gdim:rgba(0,214,143,0.1);
  --orange:#ff8c42;--red:#ff4d6d;--rdim:rgba(255,77,109,0.1);
  --yellow:#ffd166;--ydim:rgba(255,209,102,0.1);
  --text:#e2e6f0;--text2:#8b95aa;--text3:#4a5568;--white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(61,139,255,.15),transparent 70%)}
.lbox{width:100%;max-width:420px;background:var(–s1);border:1px solid var(–border2);border-radius:24px;padding:40px 36px;box-shadow:0 40px 80px rgba(0,0,0,.5);position:relative;z-index:10}
.llogo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.llogo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(–accent),#6c63ff);display:flex;align-items:center;justify-content:center;font-size:18px}
.llogo-txt{font-size:20px;font-weight:800;color:var(–white)}.llogo-txt span{color:var(–accent)}
.ltitle{font-size:24px;font-weight:700;color:var(–white);margin-bottom:6px}
.lsub{font-size:14px;color:var(–text2);margin-bottom:28px}
.lf{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.lf label{font-size:12px;font-weight:600;color:var(–text2);text-transform:uppercase;letter-spacing:.8px}
.lf input{background:var(–s2);border:1px solid var(–border2);border-radius:12px;color:var(–text);font-family:‘Outfit’,sans-serif;font-size:15px;padding:12px 16px;outline:none;transition:border-color .2s,box-shadow .2s}
.lf input:focus{border-color:var(–accent);box-shadow:0 0 0 3px var(–adim)}
.lf input::placeholder{color:var(–text3)}
.btn-login{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,var(–accent),#6c63ff);color:#fff;font-family:‘Outfit’,sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s;-webkit-appearance:none;opacity:1!important;pointer-events:all!important}
.btn-login:hover{opacity:.88}
.lerr{background:var(–rdim);border:1px solid rgba(255,77,109,.3);border-radius:10px;padding:10px 14px;font-size:13px;color:var(–red);margin-top:14px;display:none}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column}
#app.on{display:flex}
.topbar{height:58px;background:var(–s1);border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.tl{display:flex;align-items:center;gap:12px}
.tlogo{font-size:17px;font-weight:800;color:var(–white)}.tlogo span{color:var(–accent)}
.rbadge{background:var(–adim);border:1px solid rgba(61,139,255,.25);border-radius:6px;padding:2px 9px;font-size:11px;font-weight:600;color:var(–accent)}
.bell{position:relative;cursor:pointer;font-size:18px;padding:4px;user-select:none}
.bell-n{position:absolute;top:-2px;right:-4px;background:var(–red);color:#fff;border-radius:50%;width:17px;height:17px;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center}
.bell-n.on{display:flex}
.tr{display:flex;align-items:center;gap:12px}
.tav{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(–accent),#6c63ff);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.tname{font-size:13px;font-weight:600;color:var(–text2)}
.btn-out{background:transparent;border:1px solid var(–border2);border-radius:8px;padding:5px 12px;font-size:12px;color:var(–text2);cursor:pointer;font-family:‘Outfit’,sans-serif;transition:all .15s}
.btn-out:hover{border-color:var(–red);color:var(–red)}
.content{flex:1;padding:28px 24px;max-width:1100px;margin:0 auto;width:100%}

/* COMMON */
.ptitle{font-size:26px;font-weight:800;color:var(–white);margin-bottom:4px}
.psub{font-size:14px;color:var(–text2);margin-bottom:28px}
.srow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px}
.sc{background:var(–s1);border:1px solid var(–border);border-radius:16px;padding:20px}
.sc-lbl{font-size:11px;font-weight:600;color:var(–text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.sc-val{font-size:30px;font-weight:800;line-height:1}
.c-bl{color:var(–accent)}.c-gr{color:var(–green)}.c-or{color:var(–orange)}.c-rd{color:var(–red)}
.tabs{display:flex;gap:4px;background:var(–s1);border:1px solid var(–border);border-radius:12px;padding:4px;margin-bottom:24px;width:fit-content;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;color:var(–text2);border:none;background:transparent;font-family:‘Outfit’,sans-serif;transition:all .15s;position:relative}
.tab.on{background:var(–s3);color:var(–white)}
.tab-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(–red);display:none}
.tab-dot.on{display:block}
.card{background:var(–s1);border:1px solid var(–border);border-radius:16px;overflow:hidden;margin-bottom:20px}
.card-h{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(–border)}
.card-t{font-size:15px;font-weight:700;color:var(–white)}

/* USER TABLE */
.urow{display:grid;grid-template-columns:2fr 1.5fr 1fr 1fr 1.3fr 1fr;align-items:center;padding:14px 20px;border-bottom:1px solid var(–border);gap:10px;transition:background .15s}
.urow:last-child{border-bottom:none}.urow:hover{background:var(–s2)}
.urow.hdr{background:var(–s2);font-size:11px;font-weight:600;color:var(–text2);text-transform:uppercase;letter-spacing:.8px}
.urow.hdr:hover{background:var(–s2)}
.uinfo{display:flex;align-items:center;gap:10px}
.uav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.av0{background:linear-gradient(135deg,#3d8bff,#6c63ff)}.av1{background:linear-gradient(135deg,#00d68f,#00a870)}
.av2{background:linear-gradient(135deg,#ff8c42,#ff6b35)}.av3{background:linear-gradient(135deg,#ff4d6d,#c9184a)}
.av4{background:linear-gradient(135deg,#9d4edd,#7b2d8b)}.av5{background:linear-gradient(135deg,#06d6a0,#118ab2)}
.uname{font-size:14px;font-weight:600;color:var(–white)}
.ulogin{font-size:11px;color:var(–text2);font-family:‘JetBrains Mono’,monospace}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:3px 9px;font-size:11px;font-weight:600}
.bgr{background:var(–gdim);color:var(–green);border:1px solid rgba(0,214,143,.2)}
.bgy{background:rgba(139,149,170,.1);color:var(–text2);border:1px solid var(–border)}
.brd{background:var(–rdim);color:var(–red);border:1px solid rgba(255,77,109,.2)}
.byw{background:var(–ydim);color:var(–yellow);border:1px solid rgba(255,209,102,.2)}
.bbl{background:var(–adim);color:var(–accent);border:1px solid rgba(61,139,255,.2)}
.mono{font-family:‘JetBrains Mono’,monospace;font-size:12px;color:var(–text2)}
.abtns{display:flex;gap:6px}
.btic{background:transparent;border:1px solid var(–border);border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .15s}
.btic:hover{border-color:var(–red);color:var(–red)}.btic.ed:hover{border-color:var(–accent);color:var(–accent)}
.addform{background:var(–s2);border:1px solid var(–border2);border-radius:16px;padding:22px;margin-bottom:20px;display:none}
.addform.on{display:block}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.btnadd{background:var(–accent);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:‘Outfit’,sans-serif}
.btnadd:hover{opacity:.85}

/* LOG */
.logrow{display:flex;align-items:center;gap:14px;padding:13px 20px;border-bottom:1px solid var(–border);font-size:13px}
.logrow:last-child{border-bottom:none}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lgr{background:var(–green)}.lbl{background:var(–accent)}.lrd{background:var(–red)}.lyw{background:var(–yellow)}
.ltime{font-family:‘JetBrains Mono’,monospace;font-size:11px;color:var(–text2);min-width:115px}
.ltxt{color:var(–text)}.ltxt strong{color:var(–white)}

/* EXCEPTIONS */
.exc{background:var(–s1);border:1px solid var(–border);border-radius:16px;padding:20px;margin-bottom:12px}
.exc.pending{border-color:rgba(255,209,102,.35)}.exc.accepted{border-color:rgba(0,214,143,.35)}.exc.refused{border-color:rgba(255,77,109,.35)}
.exc-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.exc-who{font-size:14px;font-weight:700;color:var(–white)}
.exc-when{font-size:11px;color:var(–text2);font-family:‘JetBrains Mono’,monospace}
.exc-block{background:var(–rdim);border:1px solid rgba(255,77,109,.2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(–red);margin-bottom:12px}
.exc-note{background:var(–s2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(–text2);margin-bottom:12px}
.exc-note strong{color:var(–text);display:block;margin-bottom:4px}
.exc-qa{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.exc-qi{background:var(–s2);border-radius:8px;padding:8px 12px}
.exc-qq{font-size:10px;color:var(–text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.exc-qa2{font-size:13px;font-weight:600;color:var(–text)}
.exc-ta{width:100%;background:var(–s2);border:1px solid var(–border2);border-radius:10px;color:var(–text);font-family:‘Outfit’,sans-serif;font-size:13px;padding:10px 14px;outline:none;resize:vertical;min-height:70px;margin-bottom:10px}
.exc-ta:focus{border-color:var(–accent)}
.exc-acts{display:flex;gap:10px;flex-wrap:wrap}
.btnacc{background:linear-gradient(135deg,var(–green),#00a870);border:none;color:#000;border-radius:10px;font-family:‘Outfit’,sans-serif;font-size:13px;font-weight:700;padding:9px 20px;cursor:pointer}
.btnacc:hover{opacity:.85}
.btnref{background:transparent;border:1px solid var(–red);color:var(–red);border-radius:10px;font-family:‘Outfit’,sans-serif;font-size:13px;font-weight:600;padding:9px 20px;cursor:pointer;transition:all .15s}
.btnref:hover{background:var(–red);color:#fff}
.exc-dec{border-radius:10px;padding:12px 16px;font-size:13px;margin-top:10px;line-height:1.6}
.exc-dec.acc{background:var(–gdim);border:1px solid rgba(0,214,143,.2);color:var(–green)}
.exc-dec.ref{background:var(–rdim);border:1px solid rgba(255,77,109,.2);color:var(–red)}

/* QUESTIONNAIRE */
#qv{max-width:640px;margin:0 auto}
.qprog{height:4px;background:var(–border);border-radius:2px;margin-bottom:28px;overflow:hidden}
.qpfill{height:100%;background:linear-gradient(90deg,var(–accent),var(–green));border-radius:2px;transition:width .4s}
.qstep{animation:fu .3s ease}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.qnum{font-size:12px;font-weight:700;color:var(–accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.qtitle{font-size:22px;font-weight:800;color:var(–white);margin-bottom:6px;line-height:1.3}
.qhint{font-size:13px;color:var(–text2);margin-bottom:22px}
.qopts{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.qopt{background:var(–s2);border:1.5px solid var(–border2);border-radius:14px;padding:14px 18px;cursor:pointer;transition:all .15s;font-size:15px;font-weight:500;color:var(–text);display:flex;align-items:center;gap:12px}
.qopt:hover{border-color:var(–accent);color:var(–white);background:var(–adim)}
.qopt.sel{border-color:var(–accent);background:var(–adim);color:var(–white)}
.ochk{width:20px;height:20px;border-radius:50%;border:2px solid var(–border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.qopt.sel .ochk{background:var(–accent);border-color:var(–accent);color:#fff}
.qinp{background:var(–s2);border:1.5px solid var(–border2);border-radius:14px;color:var(–text);font-family:‘Outfit’,sans-serif;font-size:15px;padding:14px 18px;outline:none;width:100%;margin-bottom:22px;transition:border-color .2s}
.qinp:focus{border-color:var(–accent)}.qinp::placeholder{color:var(–text3)}
.qnav{display:flex;gap:12px}
.btnprev{background:transparent;border:1px solid var(–border2);color:var(–text2);border-radius:12px;font-family:‘Outfit’,sans-serif;font-size:14px;font-weight:600;padding:11px 20px;cursor:pointer;transition:all .15s}
.btnprev:hover{border-color:var(–text);color:var(–text)}
.btnnext{background:linear-gradient(135deg,var(–accent),#6c63ff);border:none;color:#fff;border-radius:12px;font-family:‘Outfit’,sans-serif;font-size:14px;font-weight:700;padding:11px 28px;cursor:pointer;flex:1;transition:opacity .15s}
.btnnext:hover{opacity:.85}.btnnext:disabled{opacity:.35;cursor:not-allowed}

/* BLOCKED */
.blkbox{background:var(–rdim);border:1px solid rgba(255,77,109,.3);border-radius:20px;padding:32px;text-align:center;animation:fu .3s ease}
.blkico{font-size:48px;margin-bottom:16px}
.blktitle{font-size:22px;font-weight:800;color:var(–red);margin-bottom:8px}
.blkreason{font-size:14px;color:var(–text2);margin-bottom:24px;line-height:1.6}
.excreq{background:var(–s2);border:1px solid var(–border2);border-radius:14px;padding:20px;text-align:left;margin-bottom:14px}
.excreq label{font-size:12px;font-weight:600;color:var(–text2);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:8px}
.btnreq{background:linear-gradient(135deg,var(–orange),#e55a00);border:none;color:#fff;border-radius:12px;font-family:‘Outfit’,sans-serif;font-size:14px;font-weight:700;padding:12px 24px;cursor:pointer;width:100%;margin-bottom:10px;transition:opacity .15s}
.btnreq:hover{opacity:.85}
.btnrst{background:transparent;border:1px solid var(–border2);color:var(–text2);border-radius:12px;font-family:‘Outfit’,sans-serif;font-size:14px;font-weight:600;padding:11px 24px;cursor:pointer;width:100%;transition:all .15s}
.btnrst:hover{border-color:var(–text);color:var(–text)}

/* WAITING */
.waitbox{background:var(–ydim);border:1px solid rgba(255,209,102,.3);border-radius:20px;padding:48px;text-align:center;animation:fu .3s ease}
.waitic{font-size:48px;margin-bottom:16px}
.waittitle{font-size:20px;font-weight:800;color:var(–yellow);margin-bottom:8px}
.waitsub{font-size:14px;color:var(–text2);line-height:1.6}

/* ELIGIBLE */
.eligbox{background:var(–gdim);border:1px solid rgba(0,214,143,.3);border-radius:20px;padding:28px;text-align:center;margin-bottom:24px}
.eligico{font-size:40px;margin-bottom:10px}
.eligtitle{font-size:20px;font-weight:800;color:var(–green);margin-bottom:4px}
.eligsub{font-size:13px;color:var(–text2)}

/* SEARCH */
.spanel{background:var(–s1);border:1px solid var(–border);border-radius:20px;padding:28px;margin-bottom:24px}
.srow2{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.sf{display:flex;flex-direction:column;gap:7px;flex:1;min-width:130px}
.sf label{font-size:11px;font-weight:600;color:var(–text2);text-transform:uppercase;letter-spacing:.8px}
.sf input{background:var(–s2);border:1px solid var(–border2);border-radius:12px;color:var(–text);font-family:‘Outfit’,sans-serif;font-size:15px;padding:12px 14px;outline:none;transition:border-color .2s}
.sf input:focus{border-color:var(–accent)}.sf input::placeholder{color:var(–text3)}
.btnsrch{background:linear-gradient(135deg,var(–accent),#6c63ff);color:#fff;border:none;border-radius:12px;font-family:‘Outfit’,sans-serif;font-size:14px;font-weight:700;padding:12px 24px;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btnsrch:hover{opacity:.88}.btnsrch:disabled{opacity:.4;cursor:not-allowed}

/* SLOTS */
.dlbl{font-size:12px;font-weight:700;color:var(–text2);text-transform:uppercase;letter-spacing:1px;margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.dlbl::after{content:’’;flex:1;height:1px;background:var(–border)}
.slotcard{background:var(–s1);border:1px solid var(–border);border-radius:16px;padding:20px;margin-bottom:10px;transition:border-color .2s,transform .15s}
.slotcard:hover{border-color:rgba(61,139,255,.4);transform:translateX(4px)}
.slottop{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.slottime{font-size:28px;font-weight:800;color:var(–white);line-height:1}
.slotdlbl{font-size:11px;color:var(–text2);margin-top:3px}
.slottech{background:var(–adim);border:1px solid rgba(61,139,255,.25);border-radius:10px;padding:6px 14px;font-size:13px;font-weight:600;color:var(–accent)}
.slotroute{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;color:var(–text2);margin-bottom:12px}
.slotcity{color:var(–text);font-weight:600}
.tpill{background:var(–s2);border:1px solid var(–border);border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;font-family:‘JetBrains Mono’,monospace}
.tpok{color:var(–green)}.tpwarn{color:var(–yellow)}
.slotmeta{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(–text2);border-top:1px solid var(–border);padding-top:12px}
.btnval{background:transparent;border:1px solid var(–green);color:var(–green);border-radius:10px;font-family:‘Outfit’,sans-serif;font-size:13px;font-weight:700;padding:8px 18px;cursor:pointer;margin-top:12px;transition:all .15s}
.btnval:hover{background:var(–green);color:#000}

/* STATE */
.statebox{text-align:center;padding:56px 20px;border:1px dashed var(–border);border-radius:20px;color:var(–text2)}
.stateico{font-size:40px;margin-bottom:14px}
.statetitle{font-size:16px;font-weight:700;color:var(–text);margin-bottom:6px}
.loader{width:32px;height:32px;border:2px solid var(–border2);border-top-color:var(–accent);border-radius:50%;animation:rot .7s linear infinite;margin:0 auto 14px}
@keyframes rot{to{transform:rotate(360deg)}}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.on{opacity:1;pointer-events:all}
.mobox{background:var(–s1);border:1px solid var(–border2);border-radius:24px;padding:32px;width:100%;max-width:500px;transform:translateY(24px);transition:transform .25s;box-shadow:0 40px 80px rgba(0,0,0,.6);max-height:90vh;overflow-y:auto}
.mo.on .mobox{transform:translateY(0)}
.motitle{font-size:20px;font-weight:800;color:var(–white);margin-bottom:6px}
.mosub{font-size:13px;color:var(–text2);margin-bottom:20px}
.mf{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.mf label{font-size:11px;font-weight:600;color:var(–text2);text-transform:uppercase;letter-spacing:.8px}
.mf input,.mf textarea,.mf select{background:var(–s2);border:1px solid var(–border2);border-radius:12px;color:var(–text);font-family:‘Outfit’,sans-serif;font-size:14px;padding:11px 14px;outline:none;width:100%;transition:border-color .2s}
.mf input:focus,.mf textarea:focus{border-color:var(–accent)}
.mf input[readonly],.mf textarea[readonly]{opacity:.55;cursor:default}
.mf textarea{resize:vertical;min-height:80px}
.moacts{display:flex;gap:10px;margin-top:20px}
.btnmcan{flex:1;background:transparent;border:1px solid var(–border2);color:var(–text2);border-radius:12px;font-family:‘Outfit’,sans-serif;font-size:14px;font-weight:600;padding:11px;cursor:pointer;transition:border-color .15s}
.btnmcan:hover{border-color:var(–text2)}

  return sorted.map(e=>{
    const u=users.find(u=>u.id===e.uid)||{name:'Inconnu'};
    const sbadge=e.status==='pending'?'<span class="badge byw">⏳ En attente</span>':e.status==='accepted'?'<span class="badge bgr">✅ Acceptée</span>':'<span class="badge brd">❌ Refusée</span>';
    const qa=Object.entries(e.answers).map(([k,v])=>{const q=QS.find(q=>q.id===k);return q?`<div class="exc-qi"><div class="exc-qq">${q.label.substring(0,35)}…</div><div class="exc-qa2">${v}</div></div>`:''}).join('');
    const dec=e.status!=='pending'?`<div class="exc-dec ${e.status==='accepted'?'acc':'ref'}"><strong>${e.status==='accepted'?'✅ Acceptée':'❌ Refusée'} — Justification admin :</strong><br>${e.adminNote||'—'}<br><small style="opacity:.6">${new Date(e.decidedAt).toLocaleString('fr-FR')}</small></div>`:'';

        <textarea class="exc-ta" id="an_${e.id}" placeholder="Ex: Le mari a 45 ans en CDI, le projet est viable financièrement. J'accepte l'exception car…"></textarea>

```
    <div class="exc-acts">
      <button class="btnacc" onclick="decide('${e.id}','accepted')">✅ Accepter l'exception</button>
      <button class="btnref" onclick="decide('${e.id}','refused')">❌ Refuser</button>
    </div>
  </div>`:'';
return`
  <div class="exc ${e.status}">
    <div class="exc-top"><div><div class="exc-who">👤 ${u.name}</div><div class="exc-when">${new Date(e.createdAt).toLocaleString('fr-FR')}</div></div>${sbadge}</div>

    <div class="exc-qa">${qa}</div>
    ${dec}${acts}
  </div>`;
```

const login=document.getElementById(‘nLogin’).value.trim();
const pass=document.getElementById(‘nPass’).value;
const role=document.getElementById(‘nRole’).value;
if(!name||!login||pass.length<6){toast(‘Remplissez tous les champs (mdp ≥ 6 caractères)’,true);return}

if(users.find(u=>u.login===login)){toast(‘Identifiant déjà utilisé’,true);return}
users.push({id:Date.now(),name,login,pass,role,av:users.length%6,rdv:0,lastLogin:null,active:true});
saveUsers(users);
addLog({type:‘admin’,user:CU.name,txt:`<strong>${CU.name}</strong> a créé le compte <strong>${name}</strong>`});
toast(`Compte ${name} créé !`);renderAdmin(‘users’);
}

// GOOGLE JWT AUTH
// ═══════════════════════════════════════════
let _tok=null,_tokExp=0;
async function getToken(){
if(_tok&&Date.now()<*tokExp-30000)return *tok;
const now=Math.floor(Date.now()/1000);
const enc=s=>btoa(JSON.stringify(s)).replace(/=/g,’’).replace(/+/g,’-’).replace(///g,’*’);
const hdr=enc({alg:‘RS256’,typ:‘JWT’});
const clm=enc({iss:SA_EMAIL,scope:‘https://www.googleapis.com/auth/spreadsheets’,aud:‘https://oauth2.googleapis.com/token’,exp:now+3600,iat:now});
const unsigned=`${hdr}.${clm}`;
const key=await importPK(SA_KEY);
const sig=await crypto.subtle.sign({name:‘RSASSA-PKCS1-v1_5’},key,new TextEncoder().encode(unsigned));
const b64=btoa(String.fromCharCode(…new Uint8Array(sig))).replace(/=/g,’’).replace(/+/g,’-’).replace(///g,’*’);
const jwt=`${unsigned}.${b64}`;
const res=await fetch(‘https://oauth2.googleapis.com/token’,{method:‘POST’,headers:{‘Content-Type’:‘application/x-www-form-urlencoded’},body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`});
const d=await res.json();
if(!d.access_token)throw new Error(‘Auth Google échouée’);
_tok=d.access_token;_tokExp=Date.now()+3500000;return _tok;
}
async function importPK(pem){
const b64=pem.replace(/—–BEGIN PRIVATE KEY—–|—–END PRIVATE KEY—–|\n/g,’’);
const bin=atob(b64);const b=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);
return crypto.subtle.importKey(‘pkcs8’,b,{name:‘RSASSA-PKCS1-v1_5’,hash:‘SHA-256’},false,[‘sign’]);
}

// DISTANCE
// ═══════════════════════════════════════════
const DC={};
async function travel(from,to){
if(!from||!to)return 999;
const key=`${from}||${to}`;
if(DC[key]!==undefined)return DC[key];
try{
const url=`https://maps.googleapis.com/maps/api/distancematrix/json?origins=${encodeURIComponent(from)}&destinations=${encodeURIComponent(to)}&mode=driving&key=${MAPS_KEY}`;
const r=await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
const d=await r.json();
const sec=d?.rows?.[0]?.elements?.[0]?.duration?.value;
const min=sec?Math.ceil(sec/60):cpEstimate(from,to);
DC[key]=min;return min;
}catch{
const est=cpEstimate(from,to);DC[key]=est;return est;
}
}
function cpEstimate(a,b){
const ca=parseInt((a.match(/\d{5}/)||[‘75’])[0].substring(0,2));
const cb=parseInt((b.match(/\d{5}/)||[‘75’])[0].substring(0,2));
return Math.min(Math.abs(ca-cb)*9+15,180);
}

const days=Object.values(byDay).filter(d=>d.date>=today).sort((a,b)=>a.date-b.date);

function openConfirm(tech,heure,cp,ville,pName){
SLOT={tech,heure,cp,ville};
document.getElementById(‘mClient’).value=pName||’’;
document.getElementById(‘mHeure’).value=heure;
document.getElementById(‘mCP’).value=cp;
document.getElementById(‘mVille’).value=ville;
document.getElementById(‘mTech’).value=tech;
const lines=Object.entries(QA).map(([k,v])=>{const q=QS.find(q=>q.id===k);return q?`${q.label}: ${v}`:null}).filter(Boolean);
document.getElementById(‘mElig’).value=lines.join(’\n’);
document.getElementById(‘cModal’).classList.add(‘on’);
}
function closeMo(){document.getElementById(‘cModal’).classList.remove(‘on’)}

async function confirmRDV(){
const client=document.getElementById(‘mClient’).value.trim();
if(!client){toast(‘Saisissez le nom du client’,true);return}
const btn=document.getElementById(‘btnConfirm’);btn.disabled=true;btn.textContent=‘Enregistrement…’;
try{
await writeRDV(SLOT.tech,SLOT.heure,client,SLOT.cp,SLOT.ville);
const users=getUsers();const idx=users.findIndex(u=>u.id===CU.id);
if(idx>=0){users[idx].rdv++;saveUsers(users);CU.rdv=users[idx].rdv}
addLog({type:‘rdv’,uid:CU.id,user:CU.name,txt:`<strong>${CU.name}</strong> a validé — <strong>${client}</strong> à ${SLOT.heure} / ${SLOT.ville} (${SLOT.tech})`});
SCACHE=null;closeMo();toast(`RDV ${client} ajouté au planning ! ✅`);
setTimeout(()=>showElig(),1800);
}catch(e){toast(’Erreur : ’+e.message,true)}
finally{btn.disabled=false;btn.textContent=‘Valider le RDV’}
}

async function writeRDV(tech,heure,client,cp,ville){
const tok=await getToken();
const tab=SCACHE?.data?.tabName||‘Sheet1’;
// Read current data to find tech block
const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(tab)}!A1:Z200`,{headers:{Authorization:`Bearer ${tok}`}});
const d=await r.json();const rows=d.values||[];
// Find tech row
let techRowIdx=-1,colStart=0;
for(let i=0;i<rows.length;i++){
const row=(rows[i]||[]).map(c=>(c||’’).trim());
if(row.some(c=>c.toUpperCase()===tech.toUpperCase())){techRowIdx=i;colStart=row.findIndex(c=>c.toUpperCase()===tech.toUpperCase());if(colStart<0)colStart=0;break}
}
// Find first empty slot row after tech row
let insertRow=techRowIdx+1;
while(insertRow<rows.length){
const row=rows[insertRow]||[];
const hasContent=row.slice(colStart,colStart+5).some(c=>c&&c.trim());
if(!hasContent)break;
insertRow++;
}
const col=String.fromCharCode(65+colStart);
const range=`${tab}!${col}${insertRow+1}`;
const wr=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`,{
method:‘PUT’,headers:{Authorization:`Bearer ${tok}`,‘Content-Type’:‘application/json’},
body:JSON.stringify({values:[[heure,client,cp,ville,‘OK’]]})
});
if(!wr.ok)throw new Error(‘Écriture Sheet échouée’);
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function toast(msg,err=false){
const t=document.getElementById(‘toast’);
t.textContent=msg;t.classList.toggle(‘err’,err);
t.classList.add(‘on’);clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove(‘on’),3500);
}
</script>
